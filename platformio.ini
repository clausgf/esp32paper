; PlatformIO Project Configuration File
;
; esp32paper — nicepaper e-paper display firmware for the Waveshare
; ESP32 e-Paper Driver Board, built on arduino4iot + GxEPD2.
;
; See README.md for the design decisions and open points.

[platformio]
default_envs = waveshare_esp32_driver
; Optional: keep secrets out of source in a git-ignored secrets.ini instead of
; include/settings.h (see secrets.ini.example and README "Secrets"). Uncomment:
; extra_configs = secrets.ini

[env]
; arduino4iot requires arduino-esp32 3.x, which PlatformIO only ships via the
; pioarduino platform fork (the registry `espressif32` platform is still 2.x).
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.20/platform-espressif32.zip
framework = arduino

upload_speed = 921600
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time

; Production log level is 2 (ERROR+WARN). Use 5 while debugging.
build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=3
    ; Make GxEPD2_BW/3C/7C derive from the common GxEPD2_GFX base so the runtime
    ; panel factory can hold them via one GxEPD2_GFX* (see src/panels.h).
    -DENABLE_GxEPD2_GFX=1
    ; --- panel support (opt-in list; enable any subset — the active panel is
    ;     chosen at runtime from config.json "panel" > NVS > default). Only the
    ;     selected panel uses RAM; unused ones cost only flash. See src/panels.h.
    -DEPAPER_PANEL_42_BW=1     ; gxepd2_420      4.2" 400x300 b/w      -> bw
    -DEPAPER_PANEL_75_BW=1     ; gxepd2_750_t7   7.5" 800x480 b/w      -> bw
    -DEPAPER_PANEL_75_BWR=1    ; gxepd2_750c_z90 7.5" 800x480 b/w/red  -> bwr
    -DEPAPER_PANEL_73_E6=1     ; gxepd2_073e01   7.3" 800x480 Spectra6 -> e6
    -DEPAPER_PANEL_73_7C=1     ; gxepd2_acep_730 7.3" 800x480 ACeP 7c  -> c7
    ; Panel used before config.json/NVS provide one (default: first enabled):
    ; -DEPAPER_DEFAULT_PANEL=\"gxepd2_420\"
    ; --- GxEPD2 page-buffer budget in bytes: page height is derived from this
    ;     so every panel is safe by default (see src/panels.h). Raise it for
    ;     fewer PNG re-decodes if your module has spare internal DRAM:
    ; -DEPAPER_PAGE_BYTES=32768
    ; --- secrets via git-ignored secrets.ini (see [platformio] extra_configs):
    ; ${secrets.build_flags}
build_unflags =
    -std=gnu++11

lib_ldf_mode = chain+
lib_deps =
    https://github.com/clausgf/arduino4iot
    zinggjm/GxEPD2 @ ^1.5.3
    adafruit/Adafruit GFX Library @ ^1.11.9
    adafruit/Adafruit BusIO @ ^1.15.0
    bblanchon/ArduinoJson @ ^7.0.0

[env:waveshare_esp32_driver]
; Waveshare "ESP32 e-Paper Driver Board" carries a plain ESP32-WROOM-32 (4 MB
; flash, no PSRAM).
board = esp32dev
; arduino-esp32 3.x + TLS is large: the default partition table's 1.25 MB OTA
; slots leave almost no headroom. min_spiffs keeps two OTA slots but grows them
; to ~1.9 MB (and shrinks the unused SPIFFS), so OTA updates keep working.
board_build.partitions = min_spiffs.csv

; --- OTA firmware distribution to the nice4iot server (optional) ---
; Uncomment and adjust to publish new firmware for OTA via scp. arduino4iot
; pulls it from file/{project}/{device}/firmware.bin on the next wakeup.
; upload_protocol = custom
; upload_command = scp $SOURCE myserver.local:/path/to/nice4iot/data/projects/my-project/firmware.bin
